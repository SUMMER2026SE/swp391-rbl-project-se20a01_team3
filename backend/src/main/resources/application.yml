spring:
  application:
    name: bee-academy-backend

  datasource:
    url: jdbc:mysql://localhost:3306/bee_academy?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true

  jackson:
    time-zone: Asia/Ho_Chi_Minh
    date-format: dd/MM/yyyy HH:mm:ss

server:
  port: 8080
  servlet:
    context-path: /api

app:
  jwt:
    secret: bee-academy-secret-key-change-this-in-production-min-256-bits
    expiration-ms: 86400000       # 24 giờ
    refresh-expiration-ms: 604800000  # 7 ngày

logging:
  level:
    com.beeacademy: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
